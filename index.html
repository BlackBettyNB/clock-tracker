<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Clock Tracker" />
  <meta name="theme-color" content="#111318" />
  <link rel="manifest" href="./manifest.json" />
  <title>Clock Tracker</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#111318;overflow:hidden;color:#e8eaed;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    #app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    input,button,select,textarea{font-family:inherit}
    ::-webkit-scrollbar{display:none}
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1)}
    .mono{font-family:'SF Mono','Fira Mono',monospace}
    .stats-bar{background:#1a1d23;border-bottom:1px solid #2a2d35;padding:12px 16px;flex-shrink:0}
    .stats-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .stat-cards{display:flex;gap:8px}
    .stat-card{background:#252830;border-radius:8px;padding:7px 10px;flex:1;text-align:center}
    .stat-lbl{font-size:10px;color:#6b7080;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
    .stat-val{font-size:14px;font-weight:700;color:#22c55e}
    .main-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .section{padding:16px}
    .card{background:#1a1d23;border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #2a2d35}
    .btn{padding:11px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
    .clock-btn{width:100%;padding:20px;border:none;border-radius:12px;font-size:20px;font-weight:800;cursor:pointer;letter-spacing:.02em;margin-bottom:12px}
    .nav{background:#1a1d23;border-top:1px solid #2a2d35;display:flex;flex-shrink:0}
    .nav-btn{flex:1;padding:12px 0 10px;border:none;background:transparent;cursor:pointer;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent;color:#6b7080}
    .nav-btn.active{color:#4a9eff;border-top-color:#4a9eff;font-weight:700}
    .nav-icon{font-size:20px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-day{width:100%;aspect-ratio:1;border:none;border-radius:8px;cursor:pointer;font-size:13px;background:#1e2028;color:#4b5060;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
    .cal-day.has-entry{color:#e8eaed}
    .cal-day.is-today{color:#4a9eff;font-weight:700;outline:1px solid #4a9eff44}
    .cal-day.sel{background:#4a9eff!important;color:#fff!important;outline:none}
    .cal-day.regular{background:#22c55e18}
    .cal-day.overtime{background:#f9731622}
    .cal-day.holiday{background:#a78bfa22}
    .cal-dot{width:5px;height:5px;border-radius:50%}
    .badge{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;color:#fff}
    .input{background:#252830;border:1px solid #3a3d45;border-radius:8px;padding:10px 12px;color:#e8eaed;font-size:15px;width:100%;display:block}
    textarea.input{resize:none;font-size:11px;line-height:1.5;height:200px}
    .overlay{position:fixed;inset:0;background:#000c;z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .sheet{background:#1a1d23;border-radius:18px 18px 0 0;padding:24px;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;border:1px solid #2a2d35}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4a9eff;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:300;box-shadow:0 4px 20px #0008;white-space:nowrap;pointer-events:none}
    .row{display:flex;gap:8px}
    .row-between{display:flex;justify-content:space-between;align-items:center}
    .lbl{font-size:10px;color:#6b7080;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
    .text-muted{color:#8b8f98;font-size:14px}
    .text-green{color:#22c55e}
    .sec-title{font-size:12px;font-weight:700;color:#6b7080;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
  </style>
</head>
<body>
<div id="app"></div>
<div id="toast-el"></div>
<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const SK = 'jack-clock-v1';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DEF_S  = {dayRate:15.13,nightRate:17.70,unpaidBreakHrs:.5,shiftLengthHrs:12,
                currentRotation:'nights',payPeriodStart:'2026-04-24',payPeriodWeeks:4,
                reminderTime:'18:00',notificationsEnabled:false};

// ── State ──────────────────────────────────────────────────────────────────────
let D = load();
let VIEW='today', CAL_M=new Date().getMonth(), CAL_Y=new Date().getFullYear();
let SEL=null, EDIT=null, CONFIRM=null, EXPORT=null, TOAST_T=null, REM_T=null;

// ── Storage ────────────────────────────────────────────────────────────────────
function load(){
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);d.settings={...DEF_S,...d.settings};return d;}}catch(e){}
  return {entries:{},settings:{...DEF_S}};
}
function persist(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}
function save(d,rerender=true){D=d;persist(d);if(rerender)render();}
function setSetting(k,v){save({...D,settings:{...D.settings,[k]:v}});}
function setEntry(key,entry){save({...D,entries:{...D.entries,[key]:entry}});}
function patchEntry(key,field,val){
  const base=D.entries[key]||{type:'regular',shiftType:D.settings.currentRotation==='nights'?'night':'day'};
  D=({...D,entries:{...D.entries,[key]:{...base,[field]:val}}});persist(D);
}

// ── Helpers ────────────────────────────────────────────────────────────────────
const pad   = n=>String(n).padStart(2,'0');
const toKey = d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const pKey  = k=>{const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);};
const fTime = d=>`${pad(d.getHours())}:${pad(d.getMinutes())}`;
const fDate = d=>d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
const esc   = s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function grid(y,m){
  const first=new Date(y,m,1);let sd=first.getDay()-1;if(sd<0)sd=6;
  const days=new Date(y,m+1,0).getDate(),cells=Array(sd).fill(null);
  for(let d=1;d<=days;d++)cells.push(d);return cells;
}

// ── Calculations ───────────────────────────────────────────────────────────────
function paidHrs(ci,co){
  if(!ci||!co)return 0;
  const[h1,m1]=ci.split(':').map(Number),[h2,m2]=co.split(':').map(Number);
  let mins=(h2*60+m2)-(h1*60+m1);if(mins<0)mins+=1440;
  return Math.max(0,mins/60-D.settings.unpaidBreakHrs);
}
function gross(hrs,st){return hrs*(st==='night'?D.settings.nightRate:D.settings.dayRate);}
function weekStart(d){const dt=new Date(d),day=dt.getDay();dt.setDate(dt.getDate()-(day===0?6:day-1));dt.setHours(0,0,0,0);return dt;}
function taxYearStart(){const now=new Date(),y=now.getFullYear(),after=now.getMonth()>3||(now.getMonth()===3&&now.getDate()>=6);return new Date(after?y:y-1,3,6);}
function totals(){
  let wP=0,mP=0,yP=0,wH=0,mH=0,yH=0;
  const now=new Date(),ws=weekStart(now),ms=new Date(now.getFullYear(),now.getMonth(),1),ys=taxYearStart();
  Object.entries(D.entries).forEach(([k,e])=>{
    if(e.type==='holiday'||!e.clockIn||!e.clockOut)return;
    const dt=pKey(k),h=paidHrs(e.clockIn,e.clockOut),g=gross(h,e.shiftType);
    if(dt>=ws){wP+=g;wH+=h;}if(dt>=ms){mP+=g;mH+=h;}if(dt>=ys){yP+=g;yH+=h;}
  });
  return{wP,mP,yP,wH,mH,yH};
}
function payPeriod(){
  if(!D.settings.payPeriodStart)return'Not set';
  const wms=D.settings.payPeriodWeeks*7*86400000;let ps=new Date(D.settings.payPeriodStart),now=new Date();
  while(ps.getTime()+wms<=now.getTime())ps=new Date(ps.getTime()+wms);
  const pe=new Date(ps.getTime()+wms-86400000),f=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return`${f(ps)} – ${f(pe)}`;
}

// ── Actions ────────────────────────────────────────────────────────────────────
function clockIn(){
  const now=new Date(),t=fTime(now),k=toKey(now);
  const e={...(D.entries[k]||{}),type:D.entries[k]?.type||'regular',
    shiftType:D.entries[k]?.shiftType||(D.settings.currentRotation==='nights'?'night':'day'),clockIn:t,clockOut:null};
  setEntry(k,e);toast(`Clocked in at ${t}`);
}
function clockOut(){
  const now=new Date(),t=fTime(now),k=toKey(now);
  if(!D.entries[k]?.clockIn)return;
  setEntry(k,{...D.entries[k],clockOut:t});toast(`Clocked out at ${t}`);
}
function dayType(key,type){
  const base=D.entries[key]||{shiftType:D.settings.currentRotation==='nights'?'night':'day'};
  const e={...base,type};if(type==='holiday'){delete e.clockIn;delete e.clockOut;}
  setEntry(key,e);
  toast(type==='holiday'?'🌴 Marked as holiday':type==='overtime'?'Marked as overtime':'Set to regular');
}
function delEntry(key){const e={...D.entries};delete e[key];save({...D,entries:e});EDIT=null;SEL=null;toast('Entry deleted');}

// ── Toast ──────────────────────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast-el');if(!el)return;
  el.innerHTML=`<div class="toast">${esc(msg)}</div>`;
  if(TOAST_T)clearTimeout(TOAST_T);TOAST_T=setTimeout(()=>{if(el)el.innerHTML='';},2500);
}

// ── Notifications ──────────────────────────────────────────────────────────────
function schedRem(){
  if(REM_T)clearTimeout(REM_T);
  if(!D.settings.notificationsEnabled||!D.settings.reminderTime)return;
  const[h,m]=D.settings.reminderTime.split(':').map(Number),tgt=new Date();
  tgt.setHours(h,m,0,0);let delay=tgt-Date.now();if(delay<0)delay+=86400000;
  REM_T=setTimeout(()=>{
    if(Notification.permission!=='granted')return;
    const fresh=load(),k=toKey(new Date()),e=fresh.entries[k];
    if(e?.clockIn&&!e?.clockOut)new Notification('⏰ Clock Out Reminder',{body:`Clocked in at ${e.clockIn} — don't forget to clock out!`,tag:'clock-out'});
  },delay);
}
async function enableNotif(){
  if(!('Notification'in window)){toast('Notifications not supported');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){setSetting('notificationsEnabled',true);toast('Notifications enabled ✓');schedRem();}
  else toast('Permission denied');
}

// ── Export ─────────────────────────────────────────────────────────────────────
function genExport(){
  const{wP,mP,yP,wH,mH,yH}=totals(),now=new Date();
  let t=`CLOCK TRACKER — DATA EXPORT\nGenerated: ${fDate(now)} ${fTime(now)}\n`;
  t+=`Day Rate: £${D.settings.dayRate}/hr  |  Night Rate: £${D.settings.nightRate}/hr\n`;
  t+=`Unpaid Break: ${D.settings.unpaidBreakHrs*60} min  |  Shift: ${D.settings.shiftLengthHrs} hrs\n`;
  t+=`Rotation: ${D.settings.currentRotation}  |  Pay Period: ${payPeriod()}\n\n`;
  t+=`DATE         TYPE        SHIFT   IN     OUT    HRS    GROSS\n${'─'.repeat(60)}\n`;
  Object.entries(D.entries).sort(([a],[b])=>a.localeCompare(b)).forEach(([k,e])=>{
    const h=(!e.clockIn||!e.clockOut||e.type==='holiday')?0:paidHrs(e.clockIn,e.clockOut);
    t+=`${k}  ${(e.type||'regular').padEnd(11)}${(e.shiftType||'-').padEnd(7)}${(e.clockIn||'-').padEnd(7)}${(e.clockOut||'-').padEnd(7)}${h.toFixed(1).padEnd(7)}£${gross(h,e.shiftType).toFixed(2)}\n`;
  });
  t+=`\n${'─'.repeat(60)}\nWeek:      ${wH.toFixed(1)} hrs  =  £${wP.toFixed(2)}\nMonth:     ${mH.toFixed(1)} hrs  =  £${mP.toFixed(2)}\nTax Year:  ${yH.toFixed(1)} hrs  =  £${yP.toFixed(2)}\n`;
  return t;
}
function doExport(){
  const text=genExport();
  if(navigator.share){navigator.share({title:'Clock Data',text}).catch(()=>{EXPORT=text;render();});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>toast('Copied ✓')).catch(()=>{EXPORT=text;render();});}
  else{EXPORT=text;render();}
}

// ── Badge / helpers ────────────────────────────────────────────────────────────
const typeBg=t=>t==='overtime'?'#f97316':t==='holiday'?'#a78bfa':'#22c55e';
const badge=t=>`<span class="badge" style="background:${typeBg(t)}">${esc(t||'regular')}</span>`;

// ── Stats Bar ──────────────────────────────────────────────────────────────────
function htmlStats(){
  const t=totals(),rate=D.settings.currentRotation==='nights'?D.settings.nightRate:D.settings.dayRate;
  return`<div class="stats-bar">
    <div class="stats-row">
      <div><div class="lbl">Current Rate</div>
        <div class="mono" style="font-size:16px;font-weight:700">£${rate.toFixed(2)}<span style="font-size:12px;color:#6b7080;font-weight:400">/hr — ${esc(D.settings.currentRotation)}</span></div></div>
      <div style="text-align:right"><div class="lbl">Pay Period</div>
        <div style="font-size:12px;font-weight:600">${esc(payPeriod())}</div></div>
    </div>
    <div class="stat-cards">${[['Week',t.wP],['Month',t.mP],['Tax Year',t.yP]].map(([l,v])=>
      `<div class="stat-card"><div class="stat-lbl">${l}</div><div class="stat-val mono">£${(v||0).toFixed(0)}</div></div>`).join('')}</div>
  </div>`;
}

// ── Today View ─────────────────────────────────────────────────────────────────
function htmlToday(){
  const now=new Date(),k=toKey(now),e=D.entries[k]||null,clkedIn=!!(e?.clockIn&&!e?.clockOut);
  let elapsed='';
  if(clkedIn&&e?.clockIn){
    const[h,m]=e.clockIn.split(':').map(Number),sm=h*60+m,nm=now.getHours()*60+now.getMinutes();
    let diff=nm-sm;if(diff<0)diff+=1440;
    const elH=Math.floor(diff/60),elM=diff%60,rem=D.settings.shiftLengthHrs*60-diff;
    const rH=Math.floor(Math.max(0,rem)/60),rM=Math.floor(Math.max(0,rem)%60);
    const rs=rem>0?`${rH}h ${pad(rM)}m`:'Done ✓',rc=rem<=0?'#22c55e':'#f59e0b';
    elapsed=`<div class="card" style="display:flex;justify-content:space-between;margin-bottom:12px">
      <div><div class="lbl">Elapsed</div><div class="mono" style="font-size:22px;font-weight:700" id="el-val">${elH}h ${pad(elM)}m</div></div>
      <div style="text-align:right"><div class="lbl">Remaining</div><div class="mono" style="font-size:22px;font-weight:700;color:${rc}" id="rem-val">${esc(rs)}</div></div>
    </div>`;
  }
  let entryCard='';
  if(e){
    let payLine='';
    if(e.clockIn&&e.clockOut){const h=paidHrs(e.clockIn,e.clockOut);payLine=`<div style="margin-top:8px" class="text-muted">Paid: <strong class="text-green">${h.toFixed(1)} hrs = £${gross(h,e.shiftType).toFixed(2)}</strong></div>`;}
    entryCard=`<div class="card" style="margin-bottom:12px">
      <div class="row-between" style="margin-bottom:8px"><span style="font-weight:600;font-size:15px">Today's shift</span>${badge(e.type||'regular')}</div>
      <div class="text-muted" style="display:flex;gap:14px;flex-wrap:wrap">
        <span>In: <strong style="color:#e8eaed">${esc(e.clockIn||'—')}</strong></span>
        <span>Out: <strong style="color:#e8eaed">${esc(e.clockOut||'—')}</strong></span>
        <span>Shift: <strong style="color:#e8eaed">${esc(e.shiftType||'—')}</strong></span>
      </div>${payLine}</div>`;
  }
  const tp=e?.type||'',otBg=tp==='overtime'?'#f97316':'#252830',holBg=tp==='holiday'?'#a78bfa':'#252830';
  const nBg=D.settings.currentRotation==='nights'?'#312e81':'#252830',nFg=D.settings.currentRotation==='nights'?'#c4b5fd':'#6b7080';
  const dBg=D.settings.currentRotation==='days'?'#78350f':'#252830',dFg=D.settings.currentRotation==='days'?'#fcd34d':'#6b7080';
  return`<div class="section">
    <div style="text-align:center;margin-bottom:22px">
      <div class="mono" id="live-clock" style="font-size:54px;font-weight:200;letter-spacing:-2px;line-height:1">${pad(now.getHours())}:${pad(now.getMinutes())}<span style="font-size:22px;color:#6b7080">:${pad(now.getSeconds())}</span></div>
      <div style="font-size:14px;color:#6b7080;margin-top:6px">${fDate(now)}</div>
    </div>
    <button class="clock-btn" data-a="${clkedIn?'cout':'cin'}" style="background:${clkedIn?'#f59e0b':'#22c55e'};color:${clkedIn?'#1a1d23':'#fff'}">${clkedIn?'⬛  CLOCK OUT':'▶  CLOCK IN'}</button>
    ${elapsed}${entryCard}
    <div class="row" style="margin-bottom:12px">
      <button class="btn" style="background:${otBg};color:#fff;flex:1" data-a="tog-ot">
        ${tp==='overtime'?'✓ Overtime':'+ Overtime'}</button>
      <button class="btn" style="background:${holBg};color:#fff;flex:1" data-a="tog-hol">
        ${tp==='holiday'?'✓ Holiday':'🌴 Holiday'}</button>
    </div>
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0">
      <span style="font-size:14px;font-weight:500">Rotation</span>
      <div class="row">
        <button class="btn" style="background:${nBg};color:${nFg};padding:7px 14px;font-size:13px" data-a="set-nights">🌙 Nights</button>
        <button class="btn" style="background:${dBg};color:${dFg};padding:7px 14px;font-size:13px" data-a="set-days">☀️ Days</button>
      </div>
    </div>
  </div>`;
}

// ── Calendar View ──────────────────────────────────────────────────────────────
function htmlCal(){
  const tok=toKey(new Date());
  const cells=grid(CAL_Y,CAL_M).map((day,i)=>{
    if(!day)return'<div></div>';
    const dk=`${CAL_Y}-${pad(CAL_M+1)}-${pad(day)}`,e=D.entries[dk];
    const cls=['cal-day'];
    if(e)cls.push('has-entry',e.type||'regular');
    if(dk===tok)cls.push('is-today');
    if(dk===SEL)cls.push('sel');
    const dc=e?.type==='overtime'?'#f97316':e?.type==='holiday'?'#a78bfa':'#22c55e';
    return`<button class="${cls.join(' ')}" data-a="csel" data-k="${dk}">${day}${e?`<div class="cal-dot" style="background:${dc}"></div>`:''}</button>`;
  }).join('');

  let panel='';
  if(SEL){
    const e=D.entries[SEL],dO=pKey(SEL);
    let detail='';
    if(e){
      const h=(e.clockIn&&e.clockOut)?paidHrs(e.clockIn,e.clockOut):0;
      const pl=h>0?`<div class="text-green" style="margin-top:4px"><strong>${h.toFixed(1)} hrs = £${gross(h,e.shiftType).toFixed(2)}</strong></div>`:'';
      detail=`<div class="row-between" style="margin-bottom:10px"><span style="font-weight:700">${fDate(dO)}</span>${badge(e.type||'regular')}</div>
        ${e.type!=='holiday'?`<div class="text-muted" style="margin-bottom:10px">In: <strong style="color:#e8eaed">${esc(e.clockIn||'—')}</strong> → Out: <strong style="color:#e8eaed">${esc(e.clockOut||'—')}</strong> (${esc(e.shiftType||'—')})${pl}</div>`:''}
        <div class="row">
          <button class="btn" style="background:#3a3d45;color:#fff;flex:1" data-a="edit" data-k="${SEL}">✏️ Edit</button>
          <button class="btn" style="background:#ef444422;color:#ef4444;flex:1" data-a="conf-del" data-k="${SEL}">🗑️ Delete</button>
        </div>`;
    }else{
      detail=`<div style="font-weight:700;margin-bottom:12px">${fDate(dO)}</div>
        <div class="row">
          <button class="btn" style="background:#22c55e;color:#fff;flex:1" data-a="add-entry" data-k="${SEL}">+ Add Entry</button>
          <button class="btn" style="background:#a78bfa;color:#fff;flex:1" data-a="set-hol" data-k="${SEL}">🌴 Holiday</button>
        </div>`;
    }
    panel=`<div class="card" style="margin-top:14px">${detail}</div>`;
  }

  return`<div class="section">
    <div class="row-between" style="margin-bottom:16px">
      <button class="btn" style="background:#252830;color:#e8eaed;padding:8px 14px" data-a="cprev">◀</button>
      <span style="font-weight:700;font-size:17px">${MONTHS[CAL_M]} ${CAL_Y}</span>
      <button class="btn" style="background:#252830;color:#e8eaed;padding:8px 14px" data-a="cnext">▶</button>
    </div>
    <div class="cal-grid" style="margin-bottom:3px">${DAYS.map(d=>`<div class="lbl" style="text-align:center;padding:4px 0;font-weight:600">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div style="display:flex;gap:14px;justify-content:center;margin-top:12px;font-size:11px;color:#6b7080">
      ${[['#22c55e','Regular'],['#f97316','Overtime'],['#a78bfa','Holiday']].map(([c,l])=>`<span style="display:flex;align-items:center;gap:5px"><div class="cal-dot" style="background:${c}"></div>${l}</span>`).join('')}
    </div>${panel}
  </div>`;
}

// ── Settings View ──────────────────────────────────────────────────────────────
function htmlSettings(){
  const s=D.settings;
  const nb=s.notificationsEnabled?`<span class="badge" style="background:#22c55e">ON</span>`:`<span class="badge" style="background:#4b5060">OFF</span>`;
  const nContent=s.notificationsEnabled
    ?`<div class="lbl" style="margin-bottom:5px">Remind me at</div>
      <input class="input" type="time" value="${esc(s.reminderTime||'18:00')}" data-s="reminderTime" data-t="str" style="margin-bottom:10px" />
      <button class="btn" style="background:#4b5060;color:#fff;width:100%" data-a="dis-notif">Disable</button>`
    :`<button class="btn" style="background:#4a9eff;color:#fff;width:100%;padding:13px" data-a="en-notif">Enable Notifications</button>`;

  return`<div class="section">
    <div style="margin-bottom:22px"><div class="sec-title">Pay Rates</div>
      <div class="row">
        <div style="flex:1"><div class="lbl" style="margin-bottom:5px">Day Rate (£/hr)</div><input class="input" type="number" step="0.01" value="${s.dayRate}" data-s="dayRate" data-t="flt" /></div>
        <div style="flex:1"><div class="lbl" style="margin-bottom:5px">Night Rate (£/hr)</div><input class="input" type="number" step="0.01" value="${s.nightRate}" data-s="nightRate" data-t="flt" /></div>
      </div></div>
    <div style="margin-bottom:22px"><div class="sec-title">Shift Setup</div>
      <div class="row">
        <div style="flex:1"><div class="lbl" style="margin-bottom:5px">Shift Length (hrs)</div><input class="input" type="number" step="0.5" value="${s.shiftLengthHrs}" data-s="shiftLengthHrs" data-t="flt" /></div>
        <div style="flex:1"><div class="lbl" style="margin-bottom:5px">Unpaid Break (hrs)</div><input class="input" type="number" step="0.25" value="${s.unpaidBreakHrs}" data-s="unpaidBreakHrs" data-t="flt" /></div>
      </div></div>
    <div style="margin-bottom:22px"><div class="sec-title">Pay Period</div>
      <div class="row">
        <div style="flex:1"><div class="lbl" style="margin-bottom:5px">Start Date</div><input class="input" type="date" value="${esc(s.payPeriodStart)}" data-s="payPeriodStart" data-t="str" /></div>
        <div style="flex:1"><div class="lbl" style="margin-bottom:5px">Length (weeks)</div><input class="input" type="number" step="1" value="${s.payPeriodWeeks}" data-s="payPeriodWeeks" data-t="int" /></div>
      </div></div>
    <div style="margin-bottom:22px"><div class="sec-title">Clock-Out Reminder</div>
      <div class="card"><div class="row-between" style="margin-bottom:12px"><span style="font-size:14px;font-weight:500">Notifications</span>${nb}</div>${nContent}</div></div>
    <div style="margin-bottom:22px"><div class="sec-title">Data</div>
      <button class="btn" style="background:#4a9eff;color:#fff;width:100%;padding:14px;margin-bottom:10px" data-a="export">📋 Export Data for Claude</button>
      <p style="font-size:12px;color:#6b7080;margin-bottom:18px;line-height:1.5">Exports all your clock records — paste into Claude to verify your pay.</p>
      <button class="btn" style="background:#ef444422;color:#ef4444;width:100%;padding:14px" data-a="conf-reset">🗑️ Reset All Data</button>
    </div>
    <p style="font-size:11px;color:#2a2d35;text-align:center;padding-bottom:8px">Data stored on this device only</p>
  </div>`;
}

// ── Edit Modal ─────────────────────────────────────────────────────────────────
function htmlEdit(){
  if(!EDIT)return'';
  const e=D.entries[EDIT]||{type:'regular',shiftType:D.settings.currentRotation==='nights'?'night':'day',clockIn:'06:00',clockOut:'18:00'};
  const h=paidHrs(e.clockIn,e.clockOut),g=gross(h,e.shiftType);
  const calcLine=h>0?`<div style="background:#0d1117;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:14px" id="calc-line"><span class="text-muted">Calculated: </span><strong class="text-green">${h.toFixed(1)} hrs = £${g.toFixed(2)}</strong></div>`:'<div id="calc-line"></div>';
  const typeBtns=['regular','overtime','holiday'].map(t=>{const a=e.type===t,bg=a?(t==='overtime'?'#f97316':t==='holiday'?'#a78bfa':'#22c55e'):'#252830';return`<button class="btn" style="background:${bg};color:${a?'#fff':'#6b7080'};flex:1;font-size:12px" data-a="etyp" data-v="${t}">${t}</button>`;}).join('');
  const shiftBtns=e.type==='holiday'?'':['night','day'].map(st=>{const a=e.shiftType===st,bg=a?(st==='night'?'#312e81':'#78350f'):'#252830',fg=a?(st==='night'?'#c4b5fd':'#fcd34d'):'#6b7080';return`<button class="btn" style="background:${bg};color:${fg};flex:1" data-a="esft" data-v="${st}">${st==='night'?'🌙 Night':'☀️ Day'}</button>`;}).join('');
  const timeInputs=e.type==='holiday'?'':`
    <div class="row" style="margin-bottom:16px">
      <div style="flex:1"><div class="lbl" style="margin-bottom:5px">Clock In</div><input class="input" type="time" id="eci" value="${esc(e.clockIn||'')}" /></div>
      <div style="flex:1"><div class="lbl" style="margin-bottom:5px">Clock Out</div><input class="input" type="time" id="eco" value="${esc(e.clockOut||'')}" /></div>
    </div>
    ${calcLine}
    <div class="row" style="margin-bottom:16px">${shiftBtns}</div>`;
  return`<div class="overlay" id="edit-ov">
    <div class="sheet">
      <div class="row-between" style="margin-bottom:20px">
        <h3 style="font-size:16px;font-weight:700;margin:0">${fDate(pKey(EDIT))}</h3>
        <button data-a="cedit" style="background:none;border:none;color:#6b7080;font-size:26px;cursor:pointer;line-height:1">×</button>
      </div>
      <div style="margin-bottom:16px"><div class="lbl" style="margin-bottom:8px">Day Type</div><div class="row">${typeBtns}</div></div>
      ${timeInputs}
      <button class="btn" style="background:#4a9eff;color:#fff;width:100%;padding:14px" data-a="cedit">Done</button>
    </div>
  </div>`;
}

// ── Confirm Modal ──────────────────────────────────────────────────────────────
function htmlConfirm(){
  if(!CONFIRM)return'';
  return`<div class="overlay" id="conf-ov">
    <div class="sheet" style="max-height:none">
      <p style="font-size:16px;text-align:center;margin-bottom:22px;line-height:1.5">${esc(CONFIRM.msg)}</p>
      <div class="row">
        <button class="btn" style="background:#3a3d45;color:#fff;flex:1;padding:14px" data-a="cno">Cancel</button>
        <button class="btn" style="background:#ef4444;color:#fff;flex:1;padding:14px" data-a="cyes">Confirm</button>
      </div>
    </div>
  </div>`;
}

// ── Export Modal ───────────────────────────────────────────────────────────────
function htmlExport(){
  if(!EXPORT)return'';
  return`<div class="overlay" id="exp-ov">
    <div class="sheet">
      <div class="row-between" style="margin-bottom:12px">
        <h3 style="font-size:15px;font-weight:700;margin:0">Clock Data Export</h3>
        <button data-a="cexp" style="background:none;border:none;color:#6b7080;font-size:26px;cursor:pointer;line-height:1">×</button>
      </div>
      <p style="font-size:12px;color:#6b7080;margin-bottom:10px">Select all and copy, then paste into Claude:</p>
      <textarea class="input" id="exp-ta" readonly>${esc(EXPORT)}</textarea>
      <button class="btn" style="background:#4a9eff;color:#fff;width:100%;padding:14px;margin-top:12px" data-a="copy-exp">Copy All</button>
    </div>
  </div>`;
}

// ── Nav ────────────────────────────────────────────────────────────────────────
function htmlNav(){
  return`<nav class="nav">${[['today','⏱','Today'],['calendar','📅','Calendar'],['settings','⚙️','Settings']].map(([v,ic,l])=>
    `<button class="nav-btn${VIEW===v?' active':''}" data-a="nav" data-v="${v}"><span class="nav-icon">${ic}</span><span>${l}</span></button>`).join('')}</nav>`;
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  app.innerHTML=`${htmlStats()}<div class="main-scroll">${VIEW==='today'?htmlToday():VIEW==='calendar'?htmlCal():htmlSettings()}</div>${htmlNav()}${htmlEdit()}${htmlConfirm()}${htmlExport()}`;
  bind();
}

// ── Bind Events ────────────────────────────────────────────────────────────────
function bind(){
  const app=document.getElementById('app');

  // Setting inputs — save on change
  app.querySelectorAll('[data-s]').forEach(inp=>{
    inp.addEventListener('change',ev=>{
      const k=ev.target.dataset.s,tp=ev.target.dataset.t;
      let v=ev.target.value;
      if(tp==='flt')v=parseFloat(v)||0;
      else if(tp==='int')v=parseInt(v)||1;
      setSetting(k,v);schedRem();
    });
  });

  // Edit modal time inputs — live calc
  const eci=document.getElementById('eci'),eco=document.getElementById('eco');
  if(eci&&EDIT)eci.addEventListener('change',ev=>{patchEntry(EDIT,'clockIn',ev.target.value);updateCalcLine();});
  if(eco&&EDIT)eco.addEventListener('change',ev=>{patchEntry(EDIT,'clockOut',ev.target.value);updateCalcLine();});

  // Delegation
  app.addEventListener('click',onClick);
}

function updateCalcLine(){
  if(!EDIT)return;
  const e=D.entries[EDIT];if(!e)return;
  const h=paidHrs(e.clockIn,e.clockOut),g=gross(h,e.shiftType);
  const el=document.getElementById('calc-line');
  if(el&&h>0)el.innerHTML=`<span class="text-muted">Calculated: </span><strong class="text-green">${h.toFixed(1)} hrs = £${g.toFixed(2)}</strong>`;
}

function onClick(ev){
  const btn=ev.target.closest('[data-a]');if(!btn)return;
  const a=btn.dataset.a,k=btn.dataset.k,v=btn.dataset.v;
  const tok=toKey(new Date());
  switch(a){
    case'cin':       clockIn();break;
    case'cout':      clockOut();break;
    case'tog-ot':    dayType(tok,D.entries[tok]?.type==='overtime'?'regular':'overtime');break;
    case'tog-hol':   dayType(tok,D.entries[tok]?.type==='holiday'?'regular':'holiday');break;
    case'set-nights':setSetting('currentRotation','nights');break;
    case'set-days':  setSetting('currentRotation','days');break;
    case'nav':       VIEW=v;SEL=null;render();break;
    case'cprev':     if(CAL_M===0){CAL_M=11;CAL_Y--;}else CAL_M--;render();break;
    case'cnext':     if(CAL_M===11){CAL_M=0;CAL_Y++;}else CAL_M++;render();break;
    case'csel':      SEL=SEL===k?null:k;render();break;
    case'edit':      EDIT=k;render();break;
    case'cedit':     EDIT=null;render();break;
    case'add-entry': patchEntry(k,'type','regular');EDIT=k;render();break;
    case'set-hol':   dayType(k,'holiday');break;
    case'conf-del':  CONFIRM={msg:'Delete this entry?',action:()=>delEntry(k)};render();break;
    case'conf-reset':CONFIRM={msg:'Delete ALL data? This cannot be undone.',action:()=>{D={entries:{},settings:{...DEF_S}};persist(D);render();toast('All data cleared');}};render();break;
    case'cno':       CONFIRM=null;render();break;
    case'cyes':      if(CONFIRM){CONFIRM.action();CONFIRM=null;}break;
    case'export':    doExport();break;
    case'cexp':      EXPORT=null;render();break;
    case'copy-exp':  {const ta=document.getElementById('exp-ta');if(ta)navigator.clipboard?.writeText(ta.value).then(()=>toast('Copied ✓'));}break;
    case'en-notif':  enableNotif();break;
    case'dis-notif': setSetting('notificationsEnabled',false);break;
    case'etyp':      if(EDIT){const base=D.entries[EDIT]||{};const ne={...base,type:v};if(v==='holiday'){delete ne.clockIn;delete ne.clockOut;}D={...D,entries:{...D.entries,[EDIT]:ne}};persist(D);render();}break;
    case'esft':      if(EDIT){patchEntry(EDIT,'shiftType',v);render();}break;
  }
}

// ── Tick (live clock & shift timer) ───────────────────────────────────────────
function tick(){
  const now=new Date(),cl=document.getElementById('live-clock');
  if(cl)cl.innerHTML=`${pad(now.getHours())}:${pad(now.getMinutes())}<span style="font-size:22px;color:#6b7080">:${pad(now.getSeconds())}</span>`;
  const k=toKey(now),e=D.entries[k];
  if(e?.clockIn&&!e?.clockOut){
    const[h,m]=e.clockIn.split(':').map(Number),sm=h*60+m,nm=now.getHours()*60+now.getMinutes();
    let diff=nm-sm;if(diff<0)diff+=1440;
    const elH=Math.floor(diff/60),elM=diff%60,rem=D.settings.shiftLengthHrs*60-diff;
    const rH=Math.floor(Math.max(0,rem)/60),rM=Math.floor(Math.max(0,rem)%60);
    const elEl=document.getElementById('el-val'),remEl=document.getElementById('rem-val');
    if(elEl)elEl.textContent=`${elH}h ${pad(elM)}m`;
    if(remEl){remEl.textContent=rem>0?`${rH}h ${pad(rM)}m`:'Done ✓';remEl.style.color=rem<=0?'#22c55e':'#f59e0b';}
  }
}

// ── Init ───────────────────────────────────────────────────────────────────────
render();
setInterval(tick,1000);
schedRem();
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW:',e)));
</script>
</body>
</html>
