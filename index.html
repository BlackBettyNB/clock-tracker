<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Clock Tracker" />
  <meta name="theme-color" content="#111318" />
  <link rel="manifest" href="./manifest.json" />
  <title>Clock Tracker</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#111318;overflow:hidden;color:#e8eaed;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    #app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    input,button,select,textarea{font-family:inherit}
    ::-webkit-scrollbar{display:none}
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1)}
    .mono{font-family:'SF Mono','Fira Mono',monospace}
    .stats-bar{background:#1a1d23;border-bottom:1px solid #2a2d35;padding:12px 16px;flex-shrink:0}
    .stats-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .stat-cards{display:flex;gap:8px}
    .stat-card{background:#252830;border-radius:8px;padding:7px 10px;flex:1;text-align:center}
    .stat-lbl{font-size:10px;color:#6b7080;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
    .stat-val{font-size:14px;font-weight:700;color:#22c55e}
    .main-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .section{padding:16px}
    .card{background:#1a1d23;border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #2a2d35}
    .btn{padding:11px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
    .clock-btn{width:100%;padding:20px;border:none;border-radius:12px;font-size:20px;font-weight:800;cursor:pointer;letter-spacing:.02em;margin-bottom:12px}
    .nav{background:#1a1d23;border-top:1px solid #2a2d35;display:flex;flex-shrink:0}
    .nav-btn{flex:1;padding:12px 0 10px;border:none;background:transparent;cursor:pointer;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent;color:#6b7080}
    .nav-btn.active{color:#4a9eff;border-top-color:#4a9eff;font-weight:700}
    .nav-icon{font-size:20px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-day{width:100%;aspect-ratio:1;border:none;border-radius:8px;cursor:pointer;font-size:13px;background:#1e2028;color:#4b5060;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
    .cal-day.has-entry{color:#e8eaed}
    .cal-day.is-today{color:#4a9eff;font-weight:700;outline:1px solid #4a9eff44}
    .cal-day.sel{background:#4a9eff!important;color:#fff!important;outline:none}
    .cal-day.regular{background:#22c55e18}
    .cal-day.overtime{background:#f9731622}
    .cal-day.holiday{background:#a78bfa22}
    .cal-dot{width:5px;height:5px;border-radius:50%}
    .badge{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;color:#fff}
    .input{background:#252830;border:1px solid #3a3d45;border-radius:8px;padding:10px 12px;color:#e8eaed;font-size:15px;width:100%;display:block}
    textarea.input{resize:none;font-size:11px;line-height:1.5;height:200px}
    .overlay{position:fixed;inset:0;background:#000c;z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .sheet{background:#1a1d23;border-radius:18px 18px 0 0;padding:24px;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;border:1px solid #2a2d35}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4a9eff;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:300;box-shadow:0 4px 20px #0008;white-space:nowrap;pointer-events:none}
    .row{display:flex;gap:8px}
    .row-between{display:flex;justify-content:space-between;align-items:center}
    .lbl{font-size:10px;color:#6b7080;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
    .text-muted{color:#8b8f98;font-size:14px}
    .text-green{color:#22c55e}
    .sec-title{font-size:12px;font-weight:700;color:#6b7080;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
  </style>
</head>
<body>
<div id="app"></div>
<div id="toast-el"></div>
<script>
// ── Constants ──────────────────────────────────────────────────────────────────
var SK = 'jack-clock-v1';
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var DEF_S = {
  dayRate:15.13, nightRate:17.70,
  otDayRate:22.69, otNightRate:26.55,
  unpaidBreakHrs:0.75, shiftLengthHrs:12,
  currentRotation:'nights',
  payPeriodStart:'2026-05-03',payPeriodWeeks:5,
  reminderTime1:'05:55', reminderTime2:'17:55',
  notificationsEnabled:false
};

// ── State ──────────────────────────────────────────────────────────────────────
var D = load();
var VIEW='today', CAL_M=new Date().getMonth(), CAL_Y=new Date().getFullYear();
var SEL=null, EDIT=null, CONFIRM=null, EXPORT=null, TOAST_T=null, REM_T1=null, REM_T2=null;

// ── Storage ────────────────────────────────────────────────────────────────────
var SEED={
// Mar 2026 — Nights (Wed/Thu/Fri)
'2026-03-03':{type:'overtime',shiftType:'night',clockIn:'17:55',clockOut:'05:02'},
'2026-03-04':{type:'regular',shiftType:'night',clockIn:'17:57',clockOut:'05:58'},
'2026-03-05':{type:'regular',shiftType:'night',clockIn:'17:58',clockOut:'06:02'},
'2026-03-06':{type:'holiday',shiftType:'night'},
'2026-03-11':{type:'regular',shiftType:'night',clockIn:'17:58',clockOut:'06:02'},
'2026-03-12':{type:'regular',shiftType:'night',clockIn:'23:58',clockOut:'05:58'},
'2026-03-13':{type:'regular',shiftType:'night',clockIn:'18:00',clockOut:'05:55'},
// Mar — Days (Thu/Fri/Sat)
'2026-03-17':{type:'overtime',shiftType:'day',clockIn:'05:58',clockOut:'17:57'},
'2026-03-19':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'17:56'},
'2026-03-20':{type:'regular',shiftType:'day',clockIn:'05:57',clockOut:'17:56'},
'2026-03-21':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'17:55'},
'2026-03-25':{type:'overtime',shiftType:'day',clockIn:'05:58',clockOut:'11:52'},
'2026-03-26':{type:'regular',shiftType:'day',clockIn:'05:57',clockOut:'18:01'},
'2026-03-27':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'17:55'},
'2026-03-28':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'17:55'},
// Apr — Days (Thu/Fri/Sat)
'2026-04-02':{type:'regular',shiftType:'day',clockIn:'05:58',clockOut:'18:01'},
'2026-04-03':{type:'regular',shiftType:'day',clockIn:'05:55',clockOut:'17:56'},
'2026-04-04':{type:'regular',shiftType:'day',clockIn:'05:57',clockOut:'17:55'},
'2026-04-09':{type:'regular',shiftType:'day',clockIn:'05:57',clockOut:'18:05'},
'2026-04-10':{type:'regular',shiftType:'day',clockIn:'05:57',clockOut:'18:01'},
'2026-04-11':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'17:55'},
// Apr — Nights (Wed/Thu/Fri)
'2026-04-15':{type:'regular',shiftType:'night',clockIn:'17:56',clockOut:'05:56'},
'2026-04-16':{type:'holiday',shiftType:'night'},
'2026-04-17':{type:'holiday',shiftType:'night'},
'2026-04-22':{type:'regular',shiftType:'night',clockIn:'17:59',clockOut:'05:55'},
'2026-04-23':{type:'regular',shiftType:'night',clockIn:'17:58',clockOut:'05:55'},
'2026-04-24':{type:'regular',shiftType:'night',clockIn:'17:58',clockOut:'05:55'},
'2026-04-29':{type:'holiday',shiftType:'night'},
'2026-04-30':{type:'holiday',shiftType:'night'},
// May — Nights (Wed/Thu/Fri)
'2026-05-01':{type:'regular',shiftType:'night',clockIn:'17:52',clockOut:'05:55'},
'2026-05-06':{type:'regular',shiftType:'night',clockIn:'17:56',clockOut:'05:55'},
'2026-05-07':{type:'regular',shiftType:'night',clockIn:'17:55',clockOut:'05:55'},
'2026-05-08':{type:'regular',shiftType:'night',clockIn:'17:57',clockOut:'05:55'},
// May — Days (Thu/Fri/Sat)
'2026-05-13':{type:'overtime',shiftType:'day',clockIn:'05:52',clockOut:'12:42'},
'2026-05-14':{type:'regular',shiftType:'day',clockIn:'05:55',clockOut:'17:57'},
'2026-05-15':{type:'regular',shiftType:'day',clockIn:'05:55',clockOut:'18:04'},
'2026-05-16':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'17:55'},
'2026-05-21':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'17:58'},
'2026-05-22':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'18:00'},
'2026-05-23':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'17:55'},
'2026-05-28':{type:'regular',shiftType:'day',clockIn:'05:57',clockOut:'17:56'},
'2026-05-29':{type:'regular',shiftType:'day',clockIn:'05:57',clockOut:'17:55'},
'2026-05-30':{type:'regular',shiftType:'day',clockIn:'05:58',clockOut:'17:55'},
// Jun — Days (Thu/Fri/Sat)
'2026-06-04':{type:'regular',shiftType:'day',clockIn:'05:58',clockOut:'17:56'},
'2026-06-05':{type:'regular',shiftType:'day',clockIn:'05:56',clockOut:'18:01'},
'2026-06-06':{type:'holiday',shiftType:'day'},
// Jun — Nights (Wed/Thu/Fri)
'2026-06-10':{type:'holiday',shiftType:'night'},
'2026-06-11':{type:'holiday',shiftType:'night'},
'2026-06-12':{type:'holiday',shiftType:'night'},
'2026-06-17':{type:'regular',shiftType:'night',clockIn:'23:53',clockOut:'05:55'},
'2026-06-18':{type:'regular',shiftType:'night',clockIn:'17:54',clockOut:'06:02'}
};

function load(){
  try{var r=localStorage.getItem(SK);if(r){var d=JSON.parse(r);d.settings=Object.assign({},DEF_S,d.settings);return d;}}catch(e){}
  return{entries:Object.assign({},SEED),settings:Object.assign({},DEF_S)};
}
function persist(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}
function save(d,doRender){D=d;persist(d);if(doRender!==false)render();}
function setSetting(k,v){save(Object.assign({},D,{settings:Object.assign({},D.settings)}));D.settings[k]=v;persist(D);render();}
function setEntry(key,entry){var e=Object.assign({},D.entries);e[key]=entry;save(Object.assign({},D,{entries:e}));}
function patchEntry(key,field,val){
  var base=D.entries[key]||{type:'regular',shiftType:D.settings.currentRotation==='nights'?'night':'day'};
  var e=Object.assign({},base);e[field]=val;
  var ents=Object.assign({},D.entries);ents[key]=e;
  D=Object.assign({},D,{entries:ents});persist(D);
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0');}
function toKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pKey(k){var p=k.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function fTime(d){return pad(d.getHours())+':'+pad(d.getMinutes());}
function fDate(d){return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function grid(y,m){
  var first=new Date(y,m,1),sd=first.getDay()-1;if(sd<0)sd=6;
  var days=new Date(y,m+1,0).getDate(),cells=[];
  for(var i=0;i<sd;i++)cells.push(null);
  for(var d=1;d<=days;d++)cells.push(d);return cells;
}

// ── Rate helper ────────────────────────────────────────────────────────────────
function getRate(shiftType, isOvertime){
  if(isOvertime){return shiftType==='night'?D.settings.otNightRate:D.settings.otDayRate;}
  return shiftType==='night'?D.settings.nightRate:D.settings.dayRate;
}
function getCurrentRate(){
  return D.settings.currentRotation==='nights'?D.settings.nightRate:D.settings.dayRate;
}
function getEntryRate(e){
  if(!e)return getCurrentRate();
  return getRate(e.shiftType, e.type==='overtime');
}

// ── Calculations ───────────────────────────────────────────────────────────────
function paidHrs(ci,co){
  if(!ci||!co)return 0;
  var p1=ci.split(':').map(Number),p2=co.split(':').map(Number);
  var mins=(p2[0]*60+p2[1])-(p1[0]*60+p1[1]);if(mins<0)mins+=1440;
  return Math.max(0,mins/60-D.settings.unpaidBreakHrs);
}
function gross(hrs,shiftType,isOvertime){return hrs*getRate(shiftType,isOvertime);}
function weekStart(d){var dt=new Date(d),day=dt.getDay();dt.setDate(dt.getDate()-(day===0?6:day-1));dt.setHours(0,0,0,0);return dt;}
function taxYearStart(){var now=new Date(),y=now.getFullYear(),after=now.getMonth()>3||(now.getMonth()===3&&now.getDate()>=6);return new Date(after?y:y-1,3,6);}
function totals(){
  var wP=0,mP=0,yP=0,wH=0,mH=0,yH=0;
  var now=new Date(),ws=weekStart(now),ms=new Date(now.getFullYear(),now.getMonth(),1),ys=taxYearStart();
  var keys=Object.keys(D.entries);
  for(var i=0;i<keys.length;i++){
    var k=keys[i],e=D.entries[k];
    if(e.type==='holiday'||!e.clockIn||!e.clockOut)continue;
    var dt=pKey(k),h=paidHrs(e.clockIn,e.clockOut),g=gross(h,e.shiftType,e.type==='overtime');
    if(dt>=ws){wP+=g;wH+=h;}if(dt>=ms){mP+=g;mH+=h;}if(dt>=ys){yP+=g;yH+=h;}
  }
  return{wP:wP,mP:mP,yP:yP,wH:wH,mH:mH,yH:yH};
}
function payPeriod(){
  if(!D.settings.payPeriodStart)return'Not set';
  var wms=D.settings.payPeriodWeeks*7*86400000,ps=new Date(D.settings.payPeriodStart),now=new Date();
  while(ps.getTime()+wms<=now.getTime())ps=new Date(ps.getTime()+wms);
  var pe=new Date(ps.getTime()+wms-86400000);
  var f=function(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});};
  return f(ps)+' – '+f(pe);
}

// ── Actions ────────────────────────────────────────────────────────────────────
function clockIn(){
  var now=new Date(),t=fTime(now),k=toKey(now);
  var existing=D.entries[k]||{};
  var e=Object.assign({},existing,{
    type:existing.type||'regular',
    shiftType:existing.shiftType||(D.settings.currentRotation==='nights'?'night':'day'),
    clockIn:t,clockOut:null
  });
  setEntry(k,e);toast('Clocked in at '+t);
}
function clockOut(){
  var now=new Date(),t=fTime(now),k=toKey(now);
  if(!D.entries[k]||!D.entries[k].clockIn)return;
  setEntry(k,Object.assign({},D.entries[k],{clockOut:t}));toast('Clocked out at '+t);
}
function dayType(key,type){
  var base=D.entries[key]||{shiftType:D.settings.currentRotation==='nights'?'night':'day'};
  var e=Object.assign({},base,{type:type});
  if(type==='holiday'){delete e.clockIn;delete e.clockOut;}
  setEntry(key,e);
  toast(type==='holiday'?'🌴 Marked as holiday':type==='overtime'?'Marked as overtime':'Set to regular');
}
function delEntry(key){
  var e=Object.assign({},D.entries);delete e[key];
  EDIT=null;SEL=null;CONFIRM=null;
  save(Object.assign({},D,{entries:e}));
  toast('Entry deleted');
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function toast(msg){
  var el=document.getElementById('toast-el');if(!el)return;
  el.innerHTML='<div class="toast">'+esc(msg)+'</div>';
  if(TOAST_T)clearTimeout(TOAST_T);TOAST_T=setTimeout(function(){if(el)el.innerHTML='';},2500);
}

// ── Notifications ──────────────────────────────────────────────────────────────
function schedRem(){
  if(REM_T1)clearTimeout(REM_T1);
  if(REM_T2)clearTimeout(REM_T2);
  if(!D.settings.notificationsEnabled)return;
  function sched(timeStr,id){
    if(!timeStr)return null;
    var p=timeStr.split(':').map(Number),tgt=new Date();
    tgt.setHours(p[0],p[1],0,0);var delay=tgt-Date.now();if(delay<0)delay+=86400000;
    return setTimeout(function(){
      if(Notification.permission!=='granted')return;
      var fresh=load(),k=toKey(new Date()),e=fresh.entries[k];
      if(e&&e.clockIn&&!e.clockOut)new Notification('⏰ Clock Out Reminder',{body:'Clocked in at '+e.clockIn+' — don\'t forget to clock out!',tag:'clock-out-'+id});
    },delay);
  }
  REM_T1=sched(D.settings.reminderTime1,'1');
  REM_T2=sched(D.settings.reminderTime2,'2');
}
function enableNotif(){
  if(!('Notification'in window)){toast('Notifications not supported');return;}
  Notification.requestPermission().then(function(p){
    if(p==='granted'){setSetting('notificationsEnabled',true);toast('Notifications enabled ✓');schedRem();}
    else toast('Permission denied');
  });
}

// ── Export ─────────────────────────────────────────────────────────────────────
function genExport(){
  var t_=totals(),now=new Date();
  var t='CLOCK TRACKER — DATA EXPORT\nGenerated: '+fDate(now)+' '+fTime(now)+'\n';
  t+='Day Rate: £'+D.settings.dayRate+'/hr  |  Night Rate: £'+D.settings.nightRate+'/hr\n';
  t+='OT Day: £'+D.settings.otDayRate+'/hr  |  OT Night: £'+D.settings.otNightRate+'/hr\n';
  t+='Unpaid Break: '+(D.settings.unpaidBreakHrs*60)+' min  |  Shift: '+D.settings.shiftLengthHrs+' hrs\n';
  t+='Rotation: '+D.settings.currentRotation+'  |  Pay Period: '+payPeriod()+'\n\n';
  t+='DATE         TYPE        SHIFT   IN     OUT    HRS    RATE     GROSS\n';
  t+=Array(68).join('─')+'\n';
  var sorted=Object.keys(D.entries).sort();
  for(var i=0;i<sorted.length;i++){
    var k=sorted[i],e=D.entries[k];
    var isOT=e.type==='overtime';
    var h=(!e.clockIn||!e.clockOut||e.type==='holiday')?0:paidHrs(e.clockIn,e.clockOut);
    var r=getRate(e.shiftType,isOT);
    var g=h*r;
    t+=k+'  '+(e.type||'regular').padEnd(11)+(e.shiftType||'-').padEnd(7)+(e.clockIn||'-').padEnd(7)+(e.clockOut||'-').padEnd(7)+h.toFixed(1).padEnd(7)+'£'+r.toFixed(2).padEnd(8)+'£'+g.toFixed(2)+'\n';
  }
  t+='\n'+Array(68).join('─')+'\n';
  t+='Week:      '+t_.wH.toFixed(1)+' hrs  =  £'+t_.wP.toFixed(2)+'\n';
  t+='Month:     '+t_.mH.toFixed(1)+' hrs  =  £'+t_.mP.toFixed(2)+'\n';
  t+='Tax Year:  '+t_.yH.toFixed(1)+' hrs  =  £'+t_.yP.toFixed(2)+'\n';
  return t;
}
function doExport(){
  var text=genExport();
  if(navigator.share){navigator.share({title:'Clock Data',text:text}).catch(function(){EXPORT=text;render();});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){toast('Copied ✓');}).catch(function(){EXPORT=text;render();});}
  else{EXPORT=text;render();}
}

// ── Badge / helpers ────────────────────────────────────────────────────────────
function typeBg(t){return t==='overtime'?'#f97316':t==='holiday'?'#a78bfa':'#22c55e';}
function badge(t){return'<span class="badge" style="background:'+typeBg(t)+'">'+esc(t||'regular')+'</span>';}

// ── Stats Bar ──────────────────────────────────────────────────────────────────
function htmlStats(){
  var t=totals(),rate=getCurrentRate();
  return'<div class="stats-bar">'+
    '<div class="stats-row">'+
      '<div><div class="lbl">Current Rate</div>'+
        '<div class="mono" style="font-size:16px;font-weight:700">£'+rate.toFixed(2)+'<span style="font-size:12px;color:#6b7080;font-weight:400">/hr — '+esc(D.settings.currentRotation)+'</span></div></div>'+
      '<div style="text-align:right"><div class="lbl">Pay Period</div>'+
        '<div style="font-size:12px;font-weight:600">'+esc(payPeriod())+'</div></div>'+
    '</div>'+
    '<div class="stat-cards">'+
      [['Week',t.wP],['Month',t.mP],['Tax Year',t.yP]].map(function(x){
        return'<div class="stat-card"><div class="stat-lbl">'+x[0]+'</div><div class="stat-val mono">£'+(x[1]||0).toFixed(0)+'</div></div>';
      }).join('')+
    '</div>'+
  '</div>';
}

// ── Today View ─────────────────────────────────────────────────────────────────
function htmlToday(){
  var now=new Date(),k=toKey(now),e=D.entries[k]||null,clkedIn=!!(e&&e.clockIn&&!e.clockOut);
  var isOT=e&&e.type==='overtime';
  var activeRate=e?getEntryRate(e):getCurrentRate();
  var elapsed='';
  if(clkedIn&&e&&e.clockIn){
    var cp=e.clockIn.split(':').map(Number),sm=cp[0]*60+cp[1],nm=now.getHours()*60+now.getMinutes();
    var diff=nm-sm;if(diff<0)diff+=1440;
    var elH=Math.floor(diff/60),elM=diff%60,rem=D.settings.shiftLengthHrs*60-diff;
    var rH=Math.floor(Math.max(0,rem)/60),rM=Math.floor(Math.max(0,rem)%60);

// ── Bind Events ────────────────────────────────────────────────────────────────
function bind(){
  var app=document.getElementById('app');

  // Setting inputs
  var inputs=app.querySelectorAll('[data-s]');
  for(var i=0;i<inputs.length;i++){
    inputs[i].addEventListener('change',function(ev){
      var k=ev.target.dataset.s,tp=ev.target.dataset.t,v=ev.target.value;
      if(tp==='flt')v=parseFloat(v)||0;
      else if(tp==='int')v=parseInt(v)||1;
      setSetting(k,v);schedRem();
    });
  }

  // Edit modal time inputs
  var eci=document.getElementById('eci'),eco=document.getElementById('eco');
  if(eci&&EDIT)eci.addEventListener('change',function(ev){patchEntry(EDIT,'clockIn',ev.target.value);updateCalcLine();});
  if(eco&&EDIT)eco.addEventListener('change',function(ev){patchEntry(EDIT,'clockOut',ev.target.value);updateCalcLine();});

  // Click delegation
  app.addEventListener('click',onClick);
}

function updateCalcLine(){
  if(!EDIT)return;
  var e=D.entries[EDIT];if(!e)return;
  var isOT=e.type==='overtime';
  var h=paidHrs(e.clockIn,e.clockOut),r=getRate(e.shiftType,isOT),g=h*r;
  var el=document.getElementById('calc-line');
  if(el&&h>0)el.innerHTML='<span class="text-muted">Calculated: </span><strong class="text-green">'+h.toFixed(1)+' hrs × £'+r.toFixed(2)+' = £'+g.toFixed(2)+'</strong>';
}

function onClick(ev){
  var btn=ev.target.closest('[data-a]');if(!btn)return;
  var a=btn.dataset.a,k=btn.dataset.k,v=btn.dataset.v;
  var tok=toKey(new Date());
  switch(a){
    case'cin':       clockIn();break;
    case'cout':      clockOut();break;
    case'tog-ot':    dayType(tok,D.entries[tok]&&D.entries[tok].type==='overtime'?'regular':'overtime');break;
    case'tog-hol':   dayType(tok,D.entries[tok]&&D.entries[tok].type==='holiday'?'regular':'holiday');break;
    case'set-nights':setSetting('currentRotation','nights');break;
    case'set-days':  setSetting('currentRotation','days');break;
    case'nav':       VIEW=v;SEL=null;render();break;
    case'cprev':     if(CAL_M===0){CAL_M=11;CAL_Y--;}else CAL_M--;render();break;
    case'cnext':     if(CAL_M===11){CAL_M=0;CAL_Y++;}else CAL_M++;render();break;
    case'csel':      SEL=SEL===k?null:k;render();break;
    case'edit':      EDIT=k;render();break;
    case'cedit':     EDIT=null;render();break;
    case'add-entry': patchEntry(k,'type','regular');EDIT=k;render();break;
    case'set-hol':   dayType(k,'holiday');break;
    case'conf-del':  CONFIRM={msg:'Delete this entry?',action:function(){delEntry(k);}};render();break;
    case'conf-reset':CONFIRM={msg:'Delete ALL data? This cannot be undone.',action:function(){D={entries:{},settings:Object.assign({},DEF_S)};persist(D);CONFIRM=null;render();toast('All data cleared');}};render();break;
    case'cno':       CONFIRM=null;render();break;
    case'cyes':      if(CONFIRM){CONFIRM.action();}break;
    case'export':    doExport();break;
    case'cexp':      EXPORT=null;render();break;
    case'copy-exp':  var ta=document.getElementById('exp-ta');if(ta&&navigator.clipboard)navigator.clipboard.writeText(ta.value).then(function(){toast('Copied ✓');});break;
    case'en-notif':  enableNotif();break;
    case'dis-notif': setSetting('notificationsEnabled',false);break;
    case'etyp':      if(EDIT){var base=D.entries[EDIT]||{};var ne=Object.assign({},base,{type:v});if(v==='holiday'){delete ne.clockIn;delete ne.clockOut;}var ents=Object.assign({},D.entries);ents[EDIT]=ne;D=Object.assign({},D,{entries:ents});persist(D);render();}break;
    case'esft':      if(EDIT){patchEntry(EDIT,'shiftType',v);render();}break;
  }
}

// ── Tick ────────────────────────────────────────────────────────────────────────
function tick(){
  var now=new Date(),cl=document.getElementById('live-clock');
  if(cl)cl.innerHTML=pad(now.getHours())+':'+pad(now.getMinutes())+'<span style="font-size:22px;color:#6b7080">:'+pad(now.getSeconds())+'</span>';
  var k=toKey(now),e=D.entries[k];
  if(e&&e.clockIn&&!e.clockOut){
    var cp=e.clockIn.split(':').map(Number),sm=cp[0]*60+cp[1],nm=now.getHours()*60+now.getMinutes();
    var diff=nm-sm;if(diff<0)diff+=1440;
    var elH=Math.floor(diff/60),elM=diff%60,rem=D.settings.shiftLengthHrs*60-diff;
    var rH=Math.floor(Math.max(0,rem)/60),rM=Math.floor(Math.max(0,rem)%60);
    var elEl=document.getElementById('el-val'),remEl=document.getElementById('rem-val');
    if(elEl)elEl.textContent=elH+'h '+pad(elM)+'m';
    if(remEl){remEl.textContent=rem>0?rH+'h '+pad(rM)+'m':'Done ✓';remEl.style.color=rem<=0?'#22c55e':'#f59e0b';}
  }
}

// ── Init ───────────────────────────────────────────────────────────────────────
render();
setInterval(tick,1000);
schedRem();
if('serviceWorker'in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(e){console.log('SW:',e);});});
</script>
